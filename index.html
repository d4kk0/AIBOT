<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מורה פרטי בינה מלאכותית</title>
    <style>
        /* --- עיצוב הבסיס (הכי יפה ולא משעמם!) --- */
        body { font-family: 'Segoe UI', sans-serif; background: #1a1b2e; color: #e0e0e0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .master-container { display: none; width: 100%; max-width: 1400px; height: 95vh; grid-template-columns: 4fr 1fr; gap: 20px; padding: 20px; box-sizing: border-box; }
        
        /* --- מסך Setup (לפני שמתחילים) --- */
        #setupScreen { background: #212232; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 400px; }
        #setupScreen input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2b3e; color: white; text-align: right; }
        #setupScreen button { width: 95%; padding: 12px; background: #805ad5; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #error-message { color: #ff4d4d; font-size: 14px; display: none; margin-top: 10px; font-weight: bold; }

        /* --- אזור הצ'אט הראשי (שמאל) --- */
        .chat-area { display: flex; flex-direction: column; background: #2a2b3e55; border-radius: 12px; overflow: hidden; }
        #messagesArea { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        /* --- בועת הודעה (כמו בתמונה) --- */
        .message-bubble { max-width: 80%; padding: 15px; border-radius: 12px; line-height: 1.6; }
        .message-bubble.bot { background: #212232; align-self: flex-start; }
        .message-bubble.user { background: #805ad5; align-self: flex-end; }
        .message-header { font-size: 13px; color: #a78bfa; margin-bottom: 5px; font-weight: bold; }

        /* --- אזור הקלט למטה --- */
        .input-bar { padding: 20px; background: #212232; border-top: 1px solid #333; display: flex; gap: 10px; }
        #userMsg { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2b3e; color: white; text-align: right; }
        .input-bar button { padding: 12px 20px; background: #805ad5; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        /* --- Sidebar (ימין - ה"מיוחד") --- */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-card { background: #212232; padding: 20px; border-radius: 12px; }
        .card-header { font-weight: bold; color: #a78bfa; margin-bottom: 10px; font-size: 14px; }
        
        /* --- קארד הטיפים עם הגלואו (כמו בתמונה) --- */
        .tip-card { 
            background: #212232; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid transparent;
            position: relative;
            box-shadow: 0 0 15px 1px rgba(214, 51, 132, 0.3), 0 0 8px 1px rgba(128, 90, 213, 0.2);
        }
        .tip-card .card-header { color: #fff; }
    </style>
</head>
<body>

    <div id="setupScreen">
        <header>
            <h1 style="color: #fff; margin-top: 0;">🎓 המורה Gemini</h1>
            <p style="color: #a78bfa;">בוא נתחיל ללמוד!</p>
        </header>
        <input type="text" id="subjectInput" placeholder="איזה מקצוע לימודי? (למשל: מדעים)">
        <input type="text" id="topicInput" placeholder="איזה נושא בדיוק? (למשל: מערכת ההובלה)">
        <div id="error-message"></div>
        <button onclick="startLearning()">בוא נלמד! 🚀</button>
    </div>

    <div class="master-container" id="appScreen">
        <div class="chat-area">
            <div id="messagesArea"></div>
            <div class="input-bar">
                <input type="text" id="userMsg" placeholder="הקלד כאן הודעה... (לחץ Enter לשליחה)">
                <button onclick="talkToAI()">שלח</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-card">
                <div class="card-header" id="topicHeader">טוען...</div>
                <div class="message-content" style="color: #a78bfa;" id="appStatus">מכין את חומרי הלימוד...</div>
            </div>
            
            <div class="tip-card">
                <div class="card-header">⭐ טִיפּ מָהִיר</div>
                <div class="message-content" style="font-size: 13px; color: #e0e0e0; line-height: 1.5;">
                    נסה לשאול את הבוט 'תסביר לי כאילו אני בן 5' אם משהו לא ברור!
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- מוח הבינה המלאכותית (GEMINI 1.5 PRO) והלוגיקה שביקשת ---
        let conversationHistory = [];
        const SERVER_URL = 'https://aibot-kh51.onrender.com/chat';

        async function startLearning() {
            const subjInput = document.getElementById('subjectInput');
            const topInput = document.getElementById('topicInput');
            const errorDiv = document.getElementById('error-message');

            const subj = subjInput.value.trim();
            const top = topInput.value.trim();

            // בדיקת ג'יבריש/שטויות: אם אין לפחות 2 אותיות (בעברית או אנגלית), או שזה רק מספרים
            const isInvalid = (str) => !/[א-תa-zA-Z]/.test(str) || str.length < 2;

            if (isInvalid(subj) || isInvalid(top)) {
                errorDiv.innerText = "אופס! נראה ששכחת למלא מקצוע או נושא. נא לכתוב משהו כמו 'מתמטיקה'.";
                errorDiv.style.display = "block";
                return;
            }

            // אם הכל תקין: מחליפים מסכים ומעדכנים את ה-Sidebar
            errorDiv.style.display = "none";
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'grid';
            
            // עדכון המראה המיוחד
            document.getElementById('topicHeader').innerText = top;
            document.getElementById('appStatus').innerText = "מתחילים ללמוד על מערכת ההובלה...";

            // קריאה ראשונה ל-AI עם ההנחיה החכמה
            await callAI(`היי, אני רוצה להתחיל ללמוד על ${top}. תוכל להסביר לי את זה הכי פשוט שאפשר?`, subj, top);
        }

        async function talkToAI() {
            const msgInput = document.getElementById('userMsg');
            const input = msgInput.value.trim();
            const subj = document.getElementById('subjectInput').value;
            const top = document.getElementById('topicInput').value;

            if (!input) return;

            // מציג הודעת משתמש
            appendMessage('user', input);
            msgInput.value = '';

            await callAI(input, subj, top);
        }

        async function callAI(userInput, subj, top) {
            try {
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userInput, subject: subj, topic: top, history: conversationHistory })
                });

                const data = await response.json();
                
                // עדכון היסטוריה ל-AI
                conversationHistory.push({ role: "user", parts: [{ text: userInput }] });
                conversationHistory.push({ role: "model", parts: [{ text: data.text }] });

                // הצגת התשובה החכמה מהמודל PRO
                appendMessage('bot', data.text);
            } catch (err) {
                // הצגת הודעת שגיאה כמו בתמונה שלך
                appendMessage('bot', "🔴 שגִיאַת חִיבּוּר... וַודָא שֶׁכָּתַבְתָּ node server.js בַּטֶרְמִינָל!");
            }
        }

        function appendMessage(role, text) {
            const area = document.getElementById('messagesArea');
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${role}`;
            
            // פורמט של בולד (**) ואימג'ים (emoji)
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            
            // מראה הכותרת מהתמונה
            const header = role === 'bot' ? '⭐⭐ הַמוֹרֶה הַאִישִׁי' : '🚀 אַתָּה';
            
            bubble.innerHTML = `
                <div class="message-header">${header}</div>
                <div class="message-content">${formattedText}</div>
            `;
            area.appendChild(bubble);
            area.scrollTop = area.scrollHeight;
        }

        // שליחה עם Enter
        document.getElementById('userMsg').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') talkToAI();
        });
    </script>
</body>
</html>
