<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>LearnAI Ultra | Future of Learning</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setupScreen" class="setup-container">
        <div class="welcome-card">
            <h1>LearnAI <span>Ultra</span></h1>
            <input type="text" id="subject" placeholder="מקצוע (למשל: ביולוגיה)">
            <input type="text" id="topic" placeholder="נושא (למשל: התא)">
            <button class="start-btn" onclick="startLearning()">שגר למידה 🚀</button>
        </div>
    </div>

    <div id="appScreen" class="app-grid" style="display: none;">
        <aside class="sidebar">
            <div class="summary-card">
                <h2 id="topicTitle"></h2>
                <div id="summaryContent">מכין את חומרי הלימוד...</div>
            </div>
            <div class="summary-card" style="margin-top: auto; border-right: 4px solid #ec4899;">
                <h3>💡 טיפ מהיר</h3>
                <p>נסה לשאול את הבוט "תסביר לי כאילו אני בן 5" אם משהו לא ברור!</p>
            </div>
        </aside>

        <section class="chat-container">
            <div id="messagesArea" class="messages-area"></div>
            <div class="input-box">
                <input type="text" id="userMsg" placeholder="הקלד כאן הודעה..." onkeypress="handleKeyPress(e)">
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
