<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setupScreen" class="container">
        <h1>🎓 Super Tutor AI</h1>
        <div class="input-group">
            <input type="text" id="subject" placeholder="Subject (e.g. Math)">
            <input type="text" id="topic" placeholder="Topic (e.g. Fractions)">
           <select id="languageSelect">
    <option value="Hebrew">Hebrew (עברית)</option>
    <option value="Arabic">Arabic (العربية)</option>
    <option value="English">English</option>
    <option value="Russian">Russian (Русский)</option>
</select>

<div id="error-message" style="color: #ff4d4d; margin-bottom: 10px; display: none; font-weight: bold;"></div>

            <button onclick="startLearning()">Start Learning 🚀</button>
        </div>
    </div>

    <div id="appScreen" class="chat-container" style="display:none;">
        <header>
            <h2 id="topicTitle">Learning...</h2>
            <button onclick="location.reload()">Back</button>
        </header>
        <div id="messagesArea"></div>
        <div class="input-area">
            <input type="text" id="userMsg" placeholder="Type your question...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
