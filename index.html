<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מורה פרטי Gemini</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1b2e; color: #e0e0e0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .master-container { display: none; width: 100%; max-width: 1400px; height: 95vh; grid-template-columns: 4fr 1fr; gap: 20px; padding: 20px; box-sizing: border-box; }
        #setupScreen { background: #212232; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 400px; }
        #setupScreen input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2b3e; color: white; text-align: right; }
        #setupScreen button { width: 95%; padding: 12px; background: #805ad5; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .chat-area { display: flex; flex-direction: column; background: rgba(42, 43, 62, 0.3); border-radius: 12px; overflow: hidden; }
        #messagesArea { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 80%; padding: 15px; border-radius: 12px; line-height: 1.6; }
        .bubble.bot { background: #212232; align-self: flex-start; }
        .bubble.user { background: #805ad5; align-self: flex-end; }
        .input-bar { padding: 20px; background: #212232; display: flex; gap: 10px; }
        #userMsg { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2b3e; color: white; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-card { background: #212232; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .glow-card { background: #212232; padding: 20px; border-radius: 12px; border: 1px solid rgba(214, 51, 132, 0.5); box-shadow: 0 0 15px rgba(214, 51, 132, 0.2); }
    </style>
</head>
<body>

    <div id="setupScreen">
        <h1>🎓 המורה Gemini</h1>
        <input type="text" id="subjIn" placeholder="מקצוע">
        <input type="text" id="topIn" placeholder="נושא">
        <button onclick="start()">בוא נלמד!</button>
    </div>

    <div class="master-container" id="appScreen">
        <div class="chat-area">
            <div id="messagesArea"></div>
            <div class="input-bar">
                <input type="text" id="userMsg" placeholder="הקלד הודעה...">
                <button onclick="send()">שלח</button>
            </div>
        </div>
        <div class="sidebar">
            <div class="sidebar-card"><b id="sideTop">נושא</b><br><small id="status">מכין חומרים...</small></div>
            <div class="glow-card"><b>⭐ טיפ</b><br><small>נסה לבקש הסבר פשוט!</small></div>
        </div>
    </div>

    <script>
        let history = [];
        // תשנה את הכתובת הזו לכתובת ה-LIVE של ה-Render שלך!
        const URL = 'https://aibot-kh51.onrender.com/chat';

        async function start() {
            const s = document.getElementById('subjIn').value;
            const t = document.getElementById('topIn').value;
            if (s.length < 2 || t.length < 2) return alert("מלא פרטים!");
            
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'grid';
            document.getElementById('sideTop').innerText = t;

            await callAI(`היי, בוא נלמד על ${t}`, s, t);
        }

        async function send() {
            const m = document.getElementById('userMsg').value;
            const s = document.getElementById('subjIn').value;
            const t = document.getElementById('topIn').value;
            if (!m) return;
            append('user', m);
            document.getElementById('userMsg').value = '';
            await callAI(m, s, t);
        }

        async function callAI(txt, s, t) {
            try {
                const res = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: txt, subject: s, topic: t, history: history })
                });
                const data = await res.json();
                history.push({ role: "user", parts: [{ text: txt }] });
                history.push({ role: "model", parts: [{ text: data.text }] });
                append('bot', data.text);
            } catch {
                append('bot', "🔴 שגיאת חיבור... וודא שכתבת את הכתובת הנכונה של Render בקוד!");
            }
        }

        function append(role, txt) {
            const area = document.getElementById('messagesArea');
            const b = document.createElement('div');
            b.className = `bubble ${role}`;
            b.innerHTML = `<b>${role === 'bot' ? '⭐⭐ המורה' : '🚀 אתה'}</b><br>${txt.replace(/\n/g, '<br>')}`;
            area.appendChild(b);
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
